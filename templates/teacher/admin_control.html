<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员控制 - 在线Python编辑器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .sidebar { min-height: 100vh; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 1055; width: 250px; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 移动端顶部导航 -->
            <nav class="navbar navbar-expand-md navbar-dark bg-dark d-md-none fixed-top">
                <div class="container-fluid">
                    <a class="navbar-brand" href="{{ url_for('teacher_dashboard') }}">教师管理</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarCanvas">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </nav>

            <!-- 侧边栏 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse bg-light offcanvas-md offcanvas-start" id="sidebarCanvas">
                <div class="offcanvas-header d-md-none">
                    <h5 class="offcanvas-title">教师管理</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarCanvas"></button>
                </div>
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('teacher_dashboard') }}">
                                <i class="bi bi-layout-dashboard"></i> 仪表盘
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('teacher_problems') }}">
                                <i class="bi bi-book-open"></i> 题库管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('teacher_stats') }}">
                                <i class="bi bi-bar-chart"></i> 答题统计
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="{{ url_for('admin_control') }}">
                                <i class="bi bi-shield"></i> 管理员控制
                            </a>
                        </li>
                    </ul>
                    <hr class="my-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                                <i class="bi bi-box-arrow-right"></i> 退出登录
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">管理员控制</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="text-muted">{{ session['username'] }}</span>
                    </div>
                </div>

                {% if message %}
                <div class="alert {% if message_type == 'success' %}alert-success{% else %}alert-danger{% endif %}" role="alert">
                    {{ message }}
                </div>
                {% endif %}

                <!-- 注册开关控制 -->
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="bi bi-toggle-on"></i> 注册开关控制</h5>
                    </div>
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <p>控制学生是否可以自行注册账号</p>
                                <p class="text-muted">当前状态: <span class="badge {% if registration_enabled %}bg-success{% else %}bg-danger{% endif %}">
                                    {% if registration_enabled %}已开放{% else %}已关闭{% endif %}
                                </span></p>
                            </div>
                            <div class="col-md-4 text-end">
                                <form method="post" action="{{ url_for('admin_control') }}">
                                    <input type="hidden" name="action" value="toggle_registration">
                                    <button type="submit" class="btn {% if registration_enabled %}btn-danger{% else %}btn-success{% endif %} border border-black">
                                        {% if registration_enabled %}关闭注册{% else %}开放注册{% endif %}
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 手动注册学生 -->
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="bi bi-person-plus"></i> 手动注册学生账号</h5>
                    </div>
                    <div class="card-body">
                        <form method="post" action="{{ url_for('admin_control') }}">
                            <input type="hidden" name="action" value="manual_register">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">用户名</label>
                                    <input type="text" class="form-control border border-black" name="username" placeholder="设置用户名" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">真实姓名</label>
                                    <input type="text" class="form-control border border-black" name="name" placeholder="学生姓名" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">密码</label>
                                    <input type="password" class="form-control border border-black" name="password" placeholder="至少6位密码" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">年段</label>
                                    <select class="form-control border border-black" name="grade" required>
                                        <option value="">选择年段</option>
                                        <option value="高一">高一</option>
                                        <option value="高二">高二</option>
                                        <option value="高三">高三</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">班级</label>
                                    <select class="form-control border border-black" name="class_number" required>
                                        <option value="">选择班级</option>
                                        {% for n in range(1, 21) %}
                                        <option value="{{ n }}">{{ n }}班</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">&nbsp;</label>
                                    <button type="submit" class="btn btn-dark border border-black w-full">注册</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 数据删除 -->
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="bi bi-trash"></i> 数据删除</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <h6>删除选项</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delete_scope" id="delete_scope_all" value="all" checked>
                                <label class="form-check-label" for="delete_scope_all">删除全部学生数据</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delete_scope" id="delete_scope_class" value="class">
                                <label class="form-check-label" for="delete_scope_class">按班级删除</label>
                            </div>
                        </div>

                        <div id="class_filter" class="mb-4" style="display: none;">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">年段</label>
                                    <select class="form-control border border-black" name="grade">
                                        <option value="">选择年段</option>
                                        {% for g in grades %}
                                        <option value="{{ g }}">{{ g }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">班级</label>
                                    <select class="form-control border border-black" name="class_number">
                                        <option value="">选择班级</option>
                                        {% for n in range(1, 21) %}
                                        <option value="{{ n }}">{{ n }}班</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h6>删除内容</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delete_content" id="delete_content_data" value="data" checked>
                                <label class="form-check-label" for="delete_content_data">仅删除答题数据（保留账号）</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delete_content" id="delete_content_all" value="all">
                                <label class="form-check-label" for="delete_content_all">删除账号及所有数据</label>
                            </div>
                        </div>

                        <div class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle"></i> <strong>警告：</strong>删除操作不可撤销，请谨慎操作！
                        </div>

                        <form method="post" action="{{ url_for('admin_control') }}">
                            <input type="hidden" name="action" value="delete_data">
                            <input type="hidden" name="delete_scope" id="hidden_delete_scope" value="all">
                            <input type="hidden" name="delete_content" id="hidden_delete_content" value="data">
                            <input type="hidden" name="grade" id="hidden_grade" value="">
                            <input type="hidden" name="class_number" id="hidden_class_number" value="">
                            <button type="button" class="btn btn-danger border border-black" data-bs-toggle="modal" data-bs-target="#confirmDeleteModal">
                                确认删除
                            </button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 确认删除弹窗 -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="delete_confirm_text">确定要执行删除操作吗？此操作不可撤销。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary border border-black" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger border border-black" id="confirm_delete_btn">确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('input[name="delete_scope"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('hidden_delete_scope').value = this.value;
                if (this.value === 'class') {
                    document.getElementById('class_filter').style.display = 'block';
                } else {
                    document.getElementById('class_filter').style.display = 'none';
                }
            });
        });

        document.querySelectorAll('input[name="delete_content"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('hidden_delete_content').value = this.value;
            });
        });

        document.getElementById('confirm_delete_btn').addEventListener('click', function() {
            document.getElementById('hidden_grade').value = document.querySelector('select[name="grade"]').value;
            document.getElementById('hidden_class_number').value = document.querySelector('select[name="class_number"]').value;
            document.querySelector('form[action="{{ url_for('admin_control') }}"]').submit();
        });
    </script>
</body>
</html>
