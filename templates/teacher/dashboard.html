<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理 - 在线Python编辑器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .sidebar { min-height: 100vh; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 1000; width: 250px; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 移动端顶部导航 -->
            <nav class="navbar navbar-expand-md navbar-dark bg-dark d-md-none fixed-top">
                <div class="container-fluid">
                    <a class="navbar-brand" href="{{ url_for('teacher_dashboard') }}">教师管理</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarCanvas">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </nav>

            <!-- 侧边栏 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse bg-light offcanvas-md offcanvas-start" id="sidebarCanvas">
                <div class="offcanvas-header d-md-none">
                    <h5 class="offcanvas-title">教师管理</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarCanvas"></button>
                </div>
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="{{ url_for('teacher_dashboard') }}">
                                <i class="bi bi-layout-dashboard"></i> 仪表盘
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('teacher_problems') }}">
                                <i class="bi bi-book-open"></i> 题库管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('teacher_stats') }}">
                                <i class="bi bi-bar-chart"></i> 答题统计
                            </a>
                        </li>
                    </ul>
                    <hr class="my-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                                <i class="bi bi-box-arrow-right"></i> 退出登录
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">教师仪表盘</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="text-muted">欢迎, {{ session['username'] }}</span>
                    </div>
                </div>

                <!-- 今日题目 -->
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="bi bi-calendar-check"></i> 今日题目</h5>
                    </div>
                    <div class="card-body">
                        {% if today_problems %}
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>序号</th>
                                        <th>题目名称</th>
                                        <th>类别</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for problem in today_problems %}
                                    <tr>
                                        <td>{{ loop.index }}</td>
                                        <td>{{ problem.title }}</td>
                                        <td><span class="badge bg-secondary">{{ problem.category }}</span></td>
                                        <td>
                                            <a href="{{ url_for('edit_problem', problem_id=problem.id) }}" class="btn btn-sm btn-primary">编辑</a>
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                        {% else %}
                        <div class="text-center py-8">
                            <i class="bi bi-calendar-x text-gray-400 text-4xl mb-3"></i>
                            <p class="text-gray-500">暂无今日题目</p>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
