<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加题目 - 在线Python编辑器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .sidebar { min-height: 100vh; }
        textarea { font-family: monospace; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse bg-light">
                <div class="position-sticky pt-3">
                    <h5 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
                        <span>教师管理</span>
                    </h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('teacher_dashboard') }}">
                                <i class="bi bi-layout-dashboard"></i> 仪表盘
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="{{ url_for('teacher_problems') }}">
                                <i class="bi bi-book-open"></i> 题库管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('teacher_stats') }}">
                                <i class="bi bi-bar-chart"></i> 答题统计
                            </a>
                        </li>
                    </ul>
                    <hr class="my-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                                <i class="bi bi-box-arrow-right"></i> 退出登录
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">添加题目</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a href="{{ url_for('teacher_problems') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> 返回
                        </a>
                    </div>
                </div>

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="card mb-4">
                        <div class="card-header bg-dark text-white">基本信息</div>
                        <div class="card-body">
                            <div class="mb-4">
                                <label for="title" class="form-label">题目标题</label>
                                <input type="text" class="form-control" id="title" name="title" placeholder="输入题目标题" required>
                            </div>
                            <div class="mb-4">
                                <label for="category" class="form-label">题目类别</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="">选择类别</option>
                                    {% for category in categories %}
                                    <option value="{{ category }}">{{ category }}</option>
                                    {% endfor %}
                                    <option value="新增类别">新增类别</option>
                                </select>
                                <input type="text" class="form-control mt-2" id="new_category" name="new_category" placeholder="输入新类别名称（如选择新增类别）" style="display: none;">
                            </div>
                            <div class="mb-4">
                                <label for="description" class="form-label">题目描述</label>
                                <textarea class="form-control" id="description" name="description" rows="4" placeholder="描述题目要求和注意事项" required></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header bg-dark text-white">代码配置</div>
                        <div class="card-body">
                            <div class="mb-4">
                                <label for="full_code" class="form-label">完整代码（教师参考）</label>
                                <textarea class="form-control" id="full_code" name="full_code" rows="10" placeholder="完整的正确代码，供教师参考" required></textarea>
                            </div>
                            <div class="mb-4">
                                <label for="student_code" class="form-label">学生模板代码（含挖空）</label>
                                <textarea class="form-control" id="student_code" name="student_code" rows="10" placeholder="给学生的模板代码，可以包含注释提示或挖空" required></textarea>
                            </div>
                            <div class="mb-4">
                                <label for="expected_output" class="form-label">预期输出结果</label>
                                <textarea class="form-control" id="expected_output" name="expected_output" rows="4" placeholder="代码正确执行后的预期输出" required></textarea>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">保存题目</button>
                </form>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('category').addEventListener('change', function() {
            document.getElementById('new_category').style.display = this.value === '新增类别' ? 'block' : 'none';
        });
    </script>
</body>
</html>
