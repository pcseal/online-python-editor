<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线Python编辑器 - 注册</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-body p-6">
                        <div class="text-center mb-6">
                            <h1 class="brand-text" style="font-size: 2rem;">在线<span class="brand-highlight" style="font-size: 1.5rem;">Python</span><span class="brand-text" style="font-size: 2rem;">编辑器</span></h1>
                            <p>创建您的学生账户</p>
                        </div>

                        {% if error %}
                        <div class="alert alert-danger" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}

                        <form method="POST">
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="username" class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="设置用户名" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="name" class="form-label">真实姓名</label>
                                    <input type="text" class="form-control" id="name" name="name" placeholder="您的姓名" required>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="grade" class="form-label">选择年段</label>
                                    <select name="grade" id="grade" class="form-select" required>
                                        <option value="">选择年段</option>
                                        <option value="高一">高一</option>
                                        <option value="高二">高二</option>
                                        <option value="高三">高三</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="class_number" class="form-label">选择班级</label>
                                    <select name="class_number" id="class_number" class="form-select" required>
                                        <option value="">选择班级</option>
                                        {% for n in range(1, 21) %}
                                        <option value="{{ n }}">{{ n }}班</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="password" class="form-label">密码</label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="至少6位密码" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="confirm_password" class="form-label">确认密码</label>
                                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="再次输入密码" required>
                                </div>
                            </div>

                            <button type="submit" class="w-full btn btn-primary py-3">
                                注册
                            </button>
                        </form>

                        <div class="mt-6 text-center">
                            <p>
                                已有账户？ <a href="{{ url_for('login') }}">立即登录</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
